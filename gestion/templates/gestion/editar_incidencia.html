{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SalasMan — Editar incidencia</title>
  <link rel="stylesheet" href="{% static 'gestion/css/crear_evento.css' %}">
  <style>
    .acciones-formulario {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 20px;
    }
    .btn--peligro {
        background-color: #e74c3c;
        color: white;
        padding: 10px 15px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
    }
    .btn--peligro:hover {
        background-color: #c0392b;
    }
  </style>
</head>

<body>
  
  <header class="cabecera">
    <div class="cabecera__titulo">
      <img src="{% static 'gestion/img/logo.png' %}" alt="Logo" class="cabecera__logo">
      <p class="cabecera__semana">Editar incidencia</p>
    </div>
    <nav class="cabecera__acciones">
      <a class="btn btn--secundario" href="{% url 'gestion:lista_incidencias' %}">← Volver a incidencias</a>
    </nav>
  </header>

  <main class="contenedor">
    
    <!-- Editar incidencia -->
    <form method="post" class="formulario">
      {% csrf_token %}

      {% if error %}
      <div class="formulario__errores">
        <p class="error">{{ error }}</p>
      </div>
      {% endif %}

      <div class="formulario__grupo">
        <label for="sala">Sala</label>
        <select id="sala" name="sala" required>
          <option value="">Selecciona una sala</option>
          {% for sala in salas %}
          <option value="{{ sala.id }}" {% if incidencia.sala.id == sala.id %}selected{% endif %}>
            {{ sala.nombre }}
          </option>
          {% endfor %}
        </select>
      </div>

      <div class="formulario__grupo">
        <label for="evento">Evento (opcional)</label>
        <select id="evento" name="evento">
          <option value="">Sin evento</option>
          {% for evento in eventos %}
          <option value="{{ evento.id }}" {% if incidencia.evento and incidencia.evento.id == evento.id %}selected{% endif %}>
            {{ evento.nombre_evento }} — {{ evento.fecha }}
          </option>
          {% endfor %}
        </select>
      </div>

      <div class="formulario__grupo">
        <label for="tipo">Tipo de incidencia</label>
        <select id="tipo" name="tipo" required>
          <option value="">Selecciona un tipo</option>
          <option value="DAÑO" {% if incidencia.tipo == 'DAÑO' %}selected{% endif %}>Daño en equipo</option>
          <option value="FALLA" {% if incidencia.tipo == 'FALLA' %}selected{% endif %}>Falla técnica</option>
          <option value="OTRO" {% if incidencia.tipo == 'OTRO' %}selected{% endif %}>Otro</option>
        </select>
      </div>

      <div class="formulario__grupo">
        <label for="descripcion">Descripción</label>
        <textarea id="descripcion" name="descripcion" rows="4" required>{{ incidencia.descripcion }}</textarea>
      </div>

      <button type="submit" class="btn btn--primario">Actualizar incidencia</button>
    </form>

    <!-- Eliminar incidencia -->
    <form method="post" action="{% url 'gestion:eliminar_incidencia' incidencia.id %}" style="margin-top: 20px; text-align: right;">
        {% csrf_token %}
        <button type="submit" class="btn btn--peligro" onclick="return confirm('¿Estás seguro de que deseas eliminar esta incidencia de manera permanente?');">
            Eliminar incidencia
        </button>
    </form>

  </main>
</body>

</html>
