{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SalasMan — Crear evento</title>
  <link rel="stylesheet" href="{% static 'gestion/css/crear_evento.css' %}">
</head>
<body>
  <header class="cabecera">
    <div class="cabecera__titulo">
      <img src="{% static 'gestion/img/logo.png' %}" alt="Logo" class="cabecera__logo">
      <p class="cabecera__semana">Nuevo evento</p>
    </div>
    <nav class="cabecera__acciones">
      <a class="btn btn--secundario" href="{% url 'gestion:calendario' %}">← Volver al calendario</a>
    </nav>
  </header>

  <main class="contenedor">
    <form method="post" class="formulario">
      {% csrf_token %}

      {% if errores %}
      <div class="formulario__errores">
      {% for campo, mensajes in errores.items %}
      {% for mensaje in mensajes %}
      <p class="error">{{ mensaje }}</p>
      {% endfor %}
      {% endfor %}
      </div>
      {% endif %}
      <div class="formulario__grupo">
        <label for="nombre_evento">Nombre del evento</label>
        <input type="text" id="nombre_evento" name="nombre_evento" required>
      </div>

      <div class="formulario__grupo">
        <label for="nombre_responsable">Responsable</label>
        <input type="text" id="nombre_responsable" name="nombre_responsable" required>
      </div>

      <div class="formulario__grupo">
        <label for="correo_responsable">Correo del responsable</label>
        <input type="email" id="correo_responsable" name="correo_responsable">
      </div>

      <div class="formulario__grupo">
        <label for="num_asistentes">Número de asistentes</label>
        <input type="number" id="num_asistentes" name="num_asistentes" min="1" required>
      </div>

      <div class="formulario__grupo">
        <label for="fecha">Fecha</label>
        <input type="date" id="fecha" name="fecha" required>
      </div>

      <div class="formulario__fila">
        <div class="formulario__grupo">
          <label for="hora_inicio">Hora inicio</label>
          <input type="time" id="hora_inicio" name="hora_inicio" required>
        </div>
        <div class="formulario__grupo">
          <label for="hora_fin">Hora fin</label>
          <input type="time" id="hora_fin" name="hora_fin" required>
        </div>
      </div>

      <div class="formulario__grupo">
        <label>Salas</label>
        <div class="formulario__salas">
          {% for sala in salas %}
          <label class="formulario__sala">
            <input type="checkbox" name="salas" value="{{ sala.id }}">
            {{ sala.nombre }}
          </label>
          {% endfor %}
        </div>
      </div>

      <div class="formulario__grupo">
        <label for="notas">Notas</label>
        <textarea id="notas" name="notas" rows="3"></textarea>
      </div>
    
      <div class="formulario__grupo">
  <label>Recurrencia</label>
  <select id="recurrencia" name="recurrencia">
    <option value="">Sin recurrencia</option>
    <option value="DIARIA">Diaria</option>
    <option value="SEMANAL">Semanal</option>
    <option value="MENSUAL">Mensual</option>
    <option value="ANUAL">Anual</option>
  </select>
</div>

<div class="formulario__grupo">
  <label for="fecha_fin_serie">Fecha fin de recurrencia</label>
  <input type="date" id="fecha_fin_serie" name="fecha_fin_serie">
</div>

<div class="formulario__grupo">
  <label>Servicios adicionales</label>
  <div class="formulario__salas">
    <label class="formulario__sala">
      <input type="checkbox" name="servicios" value="ACOMODO">
      Acomodo de mobiliario
    </label>
    <label class="formulario__sala">
      <input type="checkbox" name="servicios" value="SONIDO">
      Equipo de sonido
    </label>
    <label class="formulario__sala">
      <input type="checkbox" name="servicios" value="CAFETERIA">
      Cafetería
    </label>
    <label class="formulario__sala">
      <input type="checkbox" name="servicios" value="VIDEOCONF">
      Videoconferencia
    </label>
  </div>
</div>
      <button type="submit">Guardar evento</button>
    </form>
  </main>
</body>
</html>
